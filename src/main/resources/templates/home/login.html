<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url('/images/istockphoto-2099357117-612x612.jpg');
			background-size: cover;
					    background-position: center;
					    background-attachment: fixed;
					    background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
		
		form{
		           display: flex;
		           justify-content: center;
		           align-items: center;
		           flex-direction: column;
		       }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #2980b9;
        }

        .link {
            text-align: center;
            margin-top: 10px;
        }

        .link a {
            text-decoration: none;
            color: #3498db;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>
	
		<div id="error-message" style="color: red; margin-bottom: 10px;"></div>

    <form  id="loginForm">
        <input id="email" type="email" name="email" placeholder="Email" required>
        <input id="password" type="password" name="password" placeholder="Password" required>

        <!-- Optional Role Selection -->
		<select id="role" name="role">
		           <option id="patient" value="patient">Patient</option>
		           <option id="doctor" value="doctor">Doctor</option>
		           <option id="admin" value="admin">Admin</option>
		       </select>

        <button type="button" onclick="loginUser()">Login</button>
    </form>

    <div class="link">
        <p>Don't have an account? <a href="/api/auth/register">Register</a></p>
    </div>
</div>

<script src="/js/login.js"></script>

</body>
</html>
