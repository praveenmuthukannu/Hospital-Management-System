<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Register</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<style>
		body {
			margin: 0;
			font-family: Arial;
			background-image: url('/images/360_F_541445149_jgB6YUw2O22FPldJ8DXOvzTuSblq8GJ7.jpg');
						    background-size: cover;
						    background-position: center;
						    background-attachment: fixed;
						    background-repeat: no-repeat;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
		}

		.register-box {
			background: white;
			padding: 30px;
			width: 400px;
			border-radius: 10px;
			box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
		}

		h2 {
			text-align: center;
			margin-bottom: 20px;
		}

		form {
			display: flex;
			justify-content: center;
			align-items: center;
			flex-direction: column;
		}

		input,
		select {
			width: 100%;
			padding: 10px;
			margin: 10px 0;
		}

		button {
			width: 100%;
			padding: 10px;
			background: #2ecc71;
			color: white;
			border: none;
			border-radius: 5px;
		}

		button:hover {
			background: #27ae60;
		}

		.link {
			text-align: center;
			margin-top: 10px;
		}

		.link a {
			text-decoration: none;
			color: #3498db;
		}
	</style>
</head>

<body>

	<div class="register-box">
		<h2>Register</h2>
        
		<div id="error-message" style="color: red; margin-bottom: 10px;"></div>
		
		<form id="registationForm">
			<input id="name" type="text" name="name" placeholder="Full Name" required>
			<input id="email" type="email" name="email" placeholder="Email" required>
			<input id="password" type="password" name="password" placeholder="Password" required>
			<input id="phone" type="text" name="phone" placeholder="Phone Number">
			


			<button onclick="registerUser()" type="button">Register</button>
		</form>

		<div class="link">
			<p>Already have an account? <a href="/api/auth/login">Login</a></p>
		</div>
	</div>
	
	<script src="/js/register.js"></script>



</body >
</html >
