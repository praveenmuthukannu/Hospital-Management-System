<!DOCTYPE html>
<html>
<head>
    <title>View Doctors</title>
    <style>
        body { font-family: Arial; background: #f4f7fb; height:fit-content; }
        .container { width: 80%; margin: 40px auto; }
        h2 { text-align: center; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th { background: #2c3e50; color: white; }

        a.btn {
            padding: 8px 15px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a.btn:hover { background: #2980b9; }
		
		.back{
		           width: fit-content;
		           padding: 10px;
		           background-color: #2c3e50;
		           margin-top: 50px;
		           border: 1px solid;
		           border-radius: 5px;
		           a{
		               text-decoration: none;
		               color: white;
		           }
		          
		       }
    </style>
</head>
<body>

<div class="container">
    <h2>Available Doctors</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Specialization</th>
            <th>Experience</th>
            <th>Fee</th>
            <th>Action</th>
        </tr>

        <!-- Example Row (use Thymeleaf loop later) -->
        <tr th:each="doctor: ${listDoctor}">
            <td th:text="${doctor.name}">Dr. John</td>
            <td th:text="${doctor.specialization}">Cardiology</td>
            <td th:text="${doctor.experience}">10 yrs</td>
            <td th:text="${doctor.fee}">$50</td>
           
        </tr>

    </table>
	
	<div class="back"><a href="/api/auth/patient-dashboard"> back</a></div>
</div>

</body>
</html>
