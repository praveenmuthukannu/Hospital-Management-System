<!DOCTYPE html>
<html>

<head>
	<title>My Appointments</title>
	<style>
		body {
			font-family: Arial;
			background: #f4f7fb;
		}

		.container {
			width: 85%;
			margin: 40px auto;
		}

		h2 {
			text-align: center;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			background: white;
			box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
		}

		th,
		td {
			padding: 12px;
			border-bottom: 1px solid #ddd;
			text-align: center;
		}

		th {
			background: #2c3e50;
			color: white;
		}

		.status {
			padding: 5px 10px;
			border-radius: 5px;
			color: white;
		}

		.scheduled {
			background: orange;
		}

		.completed {
			background: green;
		}

		.cancelled {
			background: red;
		}

		.btn {
			padding: 6px 12px;
			background: red;
			color: white;
			text-decoration: none;
			border-radius: 5px;
		}

		.back {
			width: fit-content;
			padding: 10px;
			background-color: #2c3e50;
			margin-top: 50px;
			border: 1px solid;
			border-radius: 5px;

			a {
				text-decoration: none;
				color: white;
			}

			.cancel {
				width: fit-content;
				padding: 10px;
				background-color: #2c3e50;
				margin-top: 50px;
				border: 1px solid;
				border-radius: 5px;

				a {
					text-decoration: none;
					color: white;
				}
				}

			}
	</style>
</head>

<body>

	<div class="container">
		<h2>My Appointments</h2>

		<table>
			<tr>
				<th>Doctor</th>
				<th>Date</th>
				<th>Time</th>
				<th>Reason</th>
				<th>Status</th>
				<th>Action</th>
			</tr>

			<tr th:each="appt : ${listAppointment}">
				<td th:text="${appt.patientname}">Dr. John</td>
				<td th:text="${appt.date}">2026-04-10</td>
				<td th:text="${appt.time}">10:00 AM</td>
				<td th:text="${appt.reason}">Checkup</td>
				<td>
					<span th:class="'status ' + ${#strings.toLowerCase(appt.status)}"
						th:text="${appt.status}">Scheduled</span>
				</td>
				<td>
					<div class="cancel" th:if="${appt.status == 'scheduled'}">
						<button class="btn-cancel" th:onclick="'confirmCancel(' + ${appt.id} + ')'">
							Cancel
						</button>
					</div>

					<span th:unless="${appt.status == 'scheduled'}">-</span>
				</td>
			</tr>

		</table>

		<div class="back"><a href="/api/auth/patient-dashboard"> back</a></div>
	</div>

	<script>
		function confirmCancel(id) {
			if (confirm("Are you sure you want to cancel this appointment?")) {
				fetch('/api/appointment/' + id, {
					method: 'DELETE',
				})
					.then(response => {
						if (response.ok) {
							alert("Appointment cancelled.");
							location.reload(); // Refresh the table
						} else {
							alert("Failed to cancel appointment.");
						}
					});
			}
		}
	</script>

</body>

</html>
