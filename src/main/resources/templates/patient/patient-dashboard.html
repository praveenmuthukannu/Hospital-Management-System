<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
			height:fit-content;
            margin: 0;
            font-family: Arial, sans-serif;
			background-image: url('/images/images.jpg');
								    background-size: cover;
								    background-position: center;
								    background-attachment: fixed;
								    background-repeat: no-repeat;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #34495e;
        }

        /* Main Content */
        .main {
            margin-left: 220px;
            padding: 20px;
        }

        .header {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            flex: 1;
            min-width: 220px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin: 0 0 10px;
            color: #2c3e50;
        }

        .card p {
            font-size: 20px;
            font-weight: bold;
        }

        .actions {
            margin-top: 30px;
        }

        .actions a {
            display: inline-block;
            margin-right: 15px;
            padding: 12px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .actions a:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Patient dashboard</h2>
    <a href="/api/doctor/doctors">View Doctors</a>
    <a href="/api/appointment/book-appointment">Book Appointment</a>
    <a href="/api/appointment/my-appointments">My Appointments</a>
    <a href="/api/auth/login">Logout</a>
</div>

<!-- Main Content -->
<div class="main">

    <!-- Header -->
    <div  class="header">
        <h2>Welcome, <span th:text="${name}">Patient</span> 👋</h2>
        <p>Manage your appointments easily</p>
    </div>

   
    

</div>

</body>
</html>
