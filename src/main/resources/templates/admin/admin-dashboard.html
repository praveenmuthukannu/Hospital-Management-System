<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
			height:fit-content;
			 margin: 0; 
			 font-family: Arial;
			  			background-image: url('/images/pngtree-abstract-blur-hospital-clinic-medical-interior-background-image_15683664 (1).jpg');
											    background-size: cover;
											    background-position: center;
											    background-attachment: fixed;
											    background-repeat: no-repeat;;
		  }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar h2 { text-align: center; }

        .sidebar a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
        }

        .sidebar a:hover { background: #34495e; }

        .main {
            margin-left: 220px;
            padding: 20px;
        }

        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 220px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>admin-dashboard</h2>
    <a href="/api/doctor/admin-doctor">Manage Doctors</a>
    <a href="/api/auth/add-doctor">Add Doctor</a>
    <a href="/api/appointment/admin/appointments">Appointments</a>
    <a href="/api/auth/login">Logout</a>
</div>

<div class="main">
    <h2>welcome <span th:text="${name}">admin</span>🛠️</h2>

   
</div>

</body>
</html>
