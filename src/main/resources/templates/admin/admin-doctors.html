<!DOCTYPE html>
<html>
<head>
    <title>Manage Doctors</title>
    <style>
        body { font-family: Arial; background: #f4f7fb;height:fit-content; }
        .container { width: 85%; margin: 40px auto; }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th { background: #2c3e50; color: white; }

        .btn {
            padding: 6px 12px;
            border-radius: 5px;
            color: white;
            text-decoration: none;
        }

        .delete { background: red; }
        .edit { background: green; }
		
		.back{
				           width: fit-content;
				           padding: 10px;
				           background-color: #2c3e50;
				           margin-top: 50px;
				           border: 1px solid;
				           border-radius: 5px;
				           a{
				               text-decoration: none;
				               color: white;
				           }
				          
				       }
    </style>
</head>
<body>

<div class="container">
    <h2>Manage Doctors</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Specialization</th>
            <th>Experience</th>
            <th>Fee</th>
            <th>Actions</th>
        </tr>

		<tbody>
		            <tr th:each="doctor : ${doctors}">
		                <td th:text="${doctor.user.name}">Dr. John</td>
		                <td th:text="${doctor.specialization.name}">Cardiology</td>
		                <td th:text="${doctor.experience}">10</td>
		                <td th:text="${doctor.fee}">$50</td>
		                <td>
		                    <button class="btn edit" th:onclick="'openEditPage(' + ${doctor.id} + ')'">Edit</button>
		                    <button class="btn delete" th:onclick="'deleteDoctor(' + ${doctor.id} + ')'">Delete</button>
		                </td>
		            </tr>
		        </tbody>

    </table>
	<div class="back"><a href="/api/auth/admin-dashboard"> back</a></div>
</div>

<script>
	function openEditPage(doctorId) {
	    // Matches @GetMapping("/api/doctor/edit-doctor/{id}")
	    window.location.href = `/api/doctor/edit-doctor/${doctorId}`;
	}

	function deleteDoctor(doctorId) {
	    if (confirm("Are you sure you want to delete this doctor?")) {
	        fetch(`/api/doctor/delete/${doctorId}`, {
	            method: 'DELETE',
	            headers: {
	                'Authorization': 'Bearer ' + localStorage.getItem('token')
	            }
	        }).then(response => {
			            if (response.ok) {
			                alert("Doctor deleted successfully");
			                location.reload(); 
			            } else {
			                alert("Delete failed. Check if you have admin permissions.");
			            }
			        }).catch(err => console.error("Error:", err));
			    }
	}
</script>

</body>
</html>
